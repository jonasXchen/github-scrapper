name: Sheet Scraper

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      sheet_name:
        description: Sheet tab name to read from and write to
        required: false
        default: Frontier
      row_skip:
        description: Number of sheet data rows to skip after the header
        required: false
        default: "0"
      continue_scrape:
        description: Skip rows where Scraper Result (JSON) is already filled
        required: false
        default: "true"

concurrency:
  group: sheet-scrape-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sheet-scrape:
    if: github.event_name != 'schedule' || vars.AUTO_SHEET_SCRAPE_ENABLED != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 115

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build scraper
        run: cargo build --release --bin scraper

      - name: Run sheet-only scraper
        env:
          SCRAPER_MODE: sheet
          SCRAPER_SHEET_NAME: ${{ github.event.inputs.sheet_name || 'Frontier' }}
          ROW_SKIP: ${{ github.event.inputs.row_skip || '0' }}
          SCRAPER_CONTINUE: ${{ github.event.inputs.continue_scrape || 'true' }}
          PRIVATE_GITHUB_TOKEN: ${{ secrets.PRIVATE_GITHUB_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ES_APIKEY: ${{ secrets.ES_APIKEY }}
          ES_ENDPOINT: ${{ secrets.ES_ENDPOINT }}
          ES_INDEX: ${{ secrets.ES_INDEX }}
        run: cargo run --release --bin scraper
