name: Manual Sheet Scraper

on:
  workflow_dispatch:
    inputs:
      sheet_name:
        description: Sheet tab name to read from and write to
        required: false
        default: Frontier
      row_skip:
        description: Number of sheet data rows to skip after the header
        required: false
        default: "0"
      continue_scrape:
        description: Skip rows where Scraper Result (JSON) is already filled
        required: false
        default: "true"

jobs:
  sheet-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build scraper
        run: cargo build --release --bin scraper

      - name: Run sheet-only scraper
        env:
          SCRAPER_MODE: sheet
          SCRAPER_SHEET_NAME: ${{ inputs.sheet_name }}
          ROW_SKIP: ${{ inputs.row_skip }}
          SCRAPER_CONTINUE: ${{ inputs.continue_scrape }}
          PRIVATE_GITHUB_TOKEN: ${{ secrets.PRIVATE_GITHUB_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ES_APIKEY: ${{ secrets.ES_APIKEY }}
          ES_ENDPOINT: ${{ secrets.ES_ENDPOINT }}
          ES_INDEX: ${{ secrets.ES_INDEX }}
        run: cargo run --release --bin scraper
